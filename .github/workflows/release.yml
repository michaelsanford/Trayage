name: Release

# Trigger: git tag v1.2.3 on a commit that is on main, then: git push origin v1.2.3
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # v* tags are only released when the tagged commit is on the main branch.
  guard:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Check tag commit is reachable from main
        run: |
          git fetch origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag ${GITHUB_REF_NAME} is on main."
          else
            echo "::error::Tag ${GITHUB_REF_NAME} is not on the main branch; refusing to release."
            exit 1
          fi

  build:
    name: Build & Sign (${{ matrix.rid }})
    runs-on: windows-latest
    needs: guard
    permissions:
      id-token: write     # cosign keyless signing + provenance attestation
      attestations: write # actions/attest-build-provenance
      contents: read

    strategy:
      matrix:
        include:
          - rid: win-x64    # amd64
          - rid: win-arm64  # arm64

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '9.x'

      - name: Restore (${{ matrix.rid }})
        run: dotnet restore src/Trayage.App/Trayage.App.csproj --runtime ${{ matrix.rid }}

      - name: Publish self-contained (${{ matrix.rid }})
        run: >-
          dotnet publish src/Trayage.App/Trayage.App.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained
          --no-restore
          --output publish

      - name: Package archive
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "trayage-${{ github.ref_name }}-${{ matrix.rid }}.zip"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: trayage-${{ github.ref_name }}-${{ matrix.rid }}.zip

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign archive with cosign (keyless, GitHub OIDC)
        shell: pwsh
        run: cosign sign-blob --yes "trayage-${{ github.ref_name }}-${{ matrix.rid }}.zip" --bundle "trayage-${{ github.ref_name }}-${{ matrix.rid }}.zip.bundle"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.rid }}
          path: |
            trayage-${{ github.ref_name }}-${{ matrix.rid }}.zip
            trayage-${{ github.ref_name }}-${{ matrix.rid }}.zip.bundle

  sbom:
    name: Generate SBOM
    runs-on: windows-latest
    needs: guard

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '9.x'

      - name: Generate CycloneDX SBOM
        run: |
          dotnet tool install --global CycloneDX --version 6.2.0
          dotnet-CycloneDX src/Trayage.App/Trayage.App.csproj -o sbom -fn trayage-${{ github.ref_name }}-sbom.cdx.json -F Json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom/trayage-${{ github.ref_name }}-sbom.cdx.json

  release:
    name: Create Draft Release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: assets/
          merge-multiple: true

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            assets/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft
