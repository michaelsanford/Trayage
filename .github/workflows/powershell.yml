name: PowerShell Lint

# Static analysis of the repo's PowerShell scripts. Runs only when PowerShell files
# (or this workflow) change. Surfaces Error-severity diagnostics only.
on:
  push:
    # Only on main: PR branches are validated by the pull_request trigger below, so
    # restricting push to main avoids running the analysis twice on a branch with an open PR.
    branches: [main]
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - '.github/workflows/powershell.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - '.github/workflows/powershell.yml'

permissions:
  contents: read

jobs:
  analyze:
    name: PSScriptAnalyzer
    # Static analysis doesn't execute the scripts, so a Linux runner with pwsh is fine.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Analyze
        shell: pwsh
        run: Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error -EnableExit -ReportSummary
