name: CI

# Trayage is a WPF (net10.0-windows) app, so it builds on Windows only.
on:
  push:
    # Only on main: PR branches are validated by the pull_request trigger below, so
    # restricting push to main avoids running every job twice on a branch with an open PR.
    branches: [main]
    # Only build-relevant changes; docs, assets, tools, .github/**, *.ps1, LICENSE don't trigger CI.
    paths:
      - 'src/**'
      - 'tests/**'
      - '**/*.csproj'
      - '*.sln'
      - 'Directory.Build.props'
      - 'global.json'
      - 'nuget.config'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '**/*.csproj'
      - '*.sln'
      - 'Directory.Build.props'
      - 'global.json'
      - 'nuget.config'

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write   # for the coverage comment on PRs only

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.x'

      - name: Restore (locked)
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: >-
          dotnet test --configuration Release --no-build --verbosity normal
          --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Coverage report
        if: always()        # still report when a test fails
        shell: pwsh
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.5.10
          reportgenerator -reports:TestResults/**/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:"MarkdownSummaryGithub"

      - name: Publish coverage to job summary
        if: always()
        shell: pwsh
        run: Get-Content coverage-report/SummaryGithub.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true   # fork PRs get a read-only token; don't fail CI
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file coverage-report/SummaryGithub.md

  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: windows-latest
    needs: build-test
    strategy:
      matrix:
        rid: [win-x64, win-arm64]   # win-x64 = amd64

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.x'

      # Restore is RID-agnostic so it can run in locked mode (the lock file pins all
      # declared RIDs); publish then targets one RID without re-restoring.
      - name: Restore (locked)
        run: dotnet restore --locked-mode

      - name: Publish (${{ matrix.rid }})
        run: >-
          dotnet publish src/Trayage.App/Trayage.App.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained
          --no-restore
