name: CI

# Trayage is a WPF (net9.0-windows) app, so it builds on Windows only.
on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/release.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/release.yml'

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '9.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: windows-latest
    needs: build-test
    strategy:
      matrix:
        rid: [win-x64, win-arm64]   # win-x64 = amd64

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '9.x'

      - name: Restore (${{ matrix.rid }})
        run: dotnet restore src/Trayage.App/Trayage.App.csproj --runtime ${{ matrix.rid }}

      - name: Publish (${{ matrix.rid }})
        run: >-
          dotnet publish src/Trayage.App/Trayage.App.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained
          --no-restore
