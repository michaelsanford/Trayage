version: "1.0"
linter: qodana-dotnet
withinDocker: false
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses
exclude:
  - name: Xaml.BindingWithContextNotResolved
  - name: Xaml.BindingWithoutContextNotResolved
  - name: XmlHighlighting
    paths:
      - src/Trayage.App/app.manifest