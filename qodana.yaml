####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: qodana-dotnet
withinDocker: false
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses
exclude:
  - name: Xaml.BindingWithContextNotResolved
  - name: Xaml.BindingWithoutContextNotResolved
  - name: XmlHighlighting
    paths:
      - src/Trayage.App/app.manifest
  - name: MemberCanBePrivate.Global
    paths:
      - src/Trayage.App/ViewModels/InboxViewModel.cs
      - src/Trayage.App/ViewModels/SettingsViewModel.cs
      - src/Trayage.App/ViewModels/InboxItemViewModel.cs
  - name: UnusedMember.Global
    paths:
      - src/Trayage.App/ViewModels/InboxItemViewModel.cs
      - src/Trayage.App/ViewModels/SettingsViewModel.cs
      - src/Trayage.Core/Configuration/ISettingsStore.cs