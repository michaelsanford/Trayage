<?xml version="1.0" encoding="UTF-8"?>
<!--
  Trayage brand mark — a "merging branch": a git trunk (node A top, node C base)
  with one branch (node B) diverging and merging back into the mainline. A nod to
  triaging pull-request / code activity. This is the canonical full-colour badge
  (graphite tile + amber glyph, bright merge node) used by the app icon and OAuth
  tile. The single source of truth for the raster assets is tools/Build-TrayageIcons.ps1,
  which renders this same geometry with GDI+. Colours mirror docs/styles.css.

  For a monochrome glyph, drop the <rect> tile and set the strokes/fills to
  currentColor — the geometry is identical.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Trayage">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3340"/>
      <stop offset="1" stop-color="#161b23"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7" fill="url(#tile)" stroke="#343d4d" stroke-width="1"/>
  <g fill="none" stroke="#f1b24a" stroke-width="3.36" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10.24 6.4 V25.6"/>
    <path d="M23.04 25.6 C23.04 12.8 17.28 6.4 10.24 6.4"/>
  </g>
  <circle cx="10.24" cy="25.6" r="3.53" fill="#f1b24a"/>
  <circle cx="23.04" cy="25.6" r="3.53" fill="#f1b24a"/>
  <circle cx="10.24" cy="6.4" r="3.53" fill="#ffd587"/>
</svg>
