<?xml version="1.0" encoding="UTF-8"?>
<!--
  Trayage brand mark — three descending priority bars, a sorted queue: triage distilled to
  its essence. The top bar is accented amber ("act on this first"). This is the canonical
  full-colour badge (graphite tile + accented bars) used by the app icon and OAuth tile.
  The single source of truth for the raster assets is tools/Build-TrayageIcons.ps1, which
  renders this same geometry with GDI+. Colours mirror docs/styles.css.

  For the glyph alone (no tile), drop the <rect> tile — the docs site does this and lets
  its CSS supply the graphite tile behind the bars.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Trayage">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3340"/>
      <stop offset="1" stop-color="#161b23"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7" fill="url(#tile)" stroke="#343d4d" stroke-width="1"/>
  <!-- Three descending priority bars; top one accented amber. -->
  <g stroke-width="4.32" stroke-linecap="round">
    <line x1="6.4" y1="9.6" x2="26.88" y2="9.6" stroke="#ffd587"/>
    <line x1="6.4" y1="16" x2="20.48" y2="16" stroke="#5b97f7"/>
    <line x1="6.4" y1="22.4" x2="14.72" y2="22.4" stroke="#5b97f7"/>
  </g>
</svg>
